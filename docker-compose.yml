services:
  postgres:
    image: postgres:16-alpine
    container_name: gophprofile-postgres
    environment:
      POSTGRES_USER: avatars
      POSTGRES_PASSWORD: avatars
      POSTGRES_DB: avatars
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U avatars -d avatars"]
      interval: 5s
      timeout: 5s
      retries: 10

  minio:
    image: minio/minio:RELEASE.2024-10-13T13-34-11Z
    container_name: gophprofile-minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio-data:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 5s
      timeout: 5s
      retries: 10

  rabbitmq:
    image: rabbitmq:3.13-management-alpine
    container_name: gophprofile-rabbitmq
    ports:
      - "5672:5672"
      - "15672:15672"
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "-q", "ping"]
      interval: 10s
      timeout: 5s
      retries: 10

  server:
    build:
      context: .
      dockerfile: docker/Dockerfile
    container_name: gophprofile-server
    depends_on:
      postgres:
        condition: service_healthy
      minio:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    environment:
      HTTP_ADDR: ":8080"
      POSTGRES_DSN: postgres://avatars:avatars@postgres:5432/avatars?sslmode=disable
      POSTGRES_MIGRATIONS_PATH: file:///app/migrations
      S3_ENDPOINT: minio:9000
      S3_ACCESS_KEY: minioadmin
      S3_SECRET_KEY: minioadmin
      S3_BUCKET: avatars
      S3_USE_SSL: "false"
      RABBITMQ_URL: amqp://guest:guest@rabbitmq:5672/
      STATIC_DIR: /app/web/static
    ports:
      - "8080:8080"

  worker:
    build:
      context: .
      dockerfile: docker/Dockerfile
    container_name: gophprofile-worker
    depends_on:
      postgres:
        condition: service_healthy
      minio:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    entrypoint: ["/app/worker"]
    environment:
      POSTGRES_DSN: postgres://avatars:avatars@postgres:5432/avatars?sslmode=disable
      POSTGRES_MIGRATIONS_PATH: file:///app/migrations
      S3_ENDPOINT: minio:9000
      S3_ACCESS_KEY: minioadmin
      S3_SECRET_KEY: minioadmin
      S3_BUCKET: avatars
      S3_USE_SSL: "false"
      RABBITMQ_URL: amqp://guest:guest@rabbitmq:5672/

volumes:
  postgres-data:
  minio-data:
